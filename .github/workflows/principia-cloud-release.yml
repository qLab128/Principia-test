name: principia-cloud-release

on:
  push:
    branches:
      - main
      - "codex/cloud-contribution-*"
    paths:
      - "cloud/contributions/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: false
      db:
        description: "SQLite database to export"
        default: "data/principia.sqlite"
      source:
        description: "Snapshot source: db or contributions"
        default: "db"
      input_dir:
        description: "Contribution JSON directory when source=contributions"
        default: "cloud/contributions"
      output_dir:
        description: "Generated cloud snapshot directory"
        default: "dist/cloud"
      work_shards:
        description: "Work route shard count"
        default: "256"
      concept_shards:
        description: "Concept route shard count"
        default: "64"
      limit:
        description: "Optional max works to export; 0 means all"
        default: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve cloud release inputs
        id: cloud_inputs
        run: |
          tag="${TAG_INPUT:-principia-cloud-${GITHUB_SHA::12}}"
          source="${SOURCE_INPUT:-contributions}"
          db="${DB_INPUT:-data/principia.sqlite}"
          input_dir="${INPUT_DIR_INPUT:-cloud/contributions}"
          output_dir="${OUTPUT_DIR_INPUT:-dist/cloud}"
          work_shards="${WORK_SHARDS_INPUT:-256}"
          concept_shards="${CONCEPT_SHARDS_INPUT:-64}"
          limit="${LIMIT_INPUT:-0}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "source=${source}" >> "$GITHUB_OUTPUT"
          echo "db=${db}" >> "$GITHUB_OUTPUT"
          echo "input_dir=${input_dir}" >> "$GITHUB_OUTPUT"
          echo "output_dir=${output_dir}" >> "$GITHUB_OUTPUT"
          echo "work_shards=${work_shards}" >> "$GITHUB_OUTPUT"
          echo "concept_shards=${concept_shards}" >> "$GITHUB_OUTPUT"
          echo "limit=${limit}" >> "$GITHUB_OUTPUT"
        env:
          TAG_INPUT: "${{ inputs.tag }}"
          SOURCE_INPUT: "${{ inputs.source }}"
          DB_INPUT: "${{ inputs.db }}"
          INPUT_DIR_INPUT: "${{ inputs.input_dir }}"
          OUTPUT_DIR_INPUT: "${{ inputs.output_dir }}"
          WORK_SHARDS_INPUT: "${{ inputs.work_shards }}"
          CONCEPT_SHARDS_INPUT: "${{ inputs.concept_shards }}"
          LIMIT_INPUT: "${{ inputs.limit }}"
      - name: Build cloud snapshot
        run: |
          if [ "${{ steps.cloud_inputs.outputs.source }}" = "contributions" ]; then
            python principia.py cloud compact \
              --input "${{ steps.cloud_inputs.outputs.input_dir }}" \
              --out "${{ steps.cloud_inputs.outputs.output_dir }}"
          else
            python principia.py cloud export-snapshot \
              --db "${{ steps.cloud_inputs.outputs.db }}" \
              --out "${{ steps.cloud_inputs.outputs.output_dir }}" \
              --work-shards "${{ steps.cloud_inputs.outputs.work_shards }}" \
              --concept-shards "${{ steps.cloud_inputs.outputs.concept_shards }}" \
              --limit "${{ steps.cloud_inputs.outputs.limit }}"
          fi
      - name: Rewrite manifest URLs and pointer
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          tag = os.environ["PRINCIPIA_CLOUD_TAG"]
          repo = os.environ["GITHUB_REPOSITORY"]
          out_dir = Path(os.environ["PRINCIPIA_CLOUD_OUTPUT_DIR"])
          manifest_path = out_dir / "manifest.json"
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          release_base = f"https://github.com/{repo}/releases/download/{tag}/"
          for asset in manifest.get("assets", []):
              asset["url"] = release_base + Path(asset["url"]).name
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, sort_keys=True, indent=2) + "\n", encoding="utf-8")
          raw = manifest_path.read_bytes()
          pointer = {
              "schema_version": "principia-cloud-pointer-1.1",
              "latest_snapshot_id": manifest.get("snapshot_id", ""),
              "latest_manifest_url": release_base + "manifest.json",
              "latest_manifest_sha256": hashlib.sha256(raw).hexdigest(),
              "updated_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
          }
          pointer_path = Path("cloud/manifests/latest.json")
          pointer_path.parent.mkdir(parents=True, exist_ok=True)
          pointer_path.write_text(json.dumps(pointer, ensure_ascii=False, sort_keys=True, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          PRINCIPIA_CLOUD_TAG: "${{ steps.cloud_inputs.outputs.tag }}"
          PRINCIPIA_CLOUD_OUTPUT_DIR: "${{ steps.cloud_inputs.outputs.output_dir }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.cloud_inputs.outputs.tag }}"
          files: |
            ${{ steps.cloud_inputs.outputs.output_dir }}/manifest.json
            ${{ steps.cloud_inputs.outputs.output_dir }}/stats.json
            ${{ steps.cloud_inputs.outputs.output_dir }}/checksums.sha256
            ${{ steps.cloud_inputs.outputs.output_dir }}/packs/*
            ${{ steps.cloud_inputs.outputs.output_dir }}/indexes/*
      - name: Commit latest manifest pointer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud/manifests/latest.json
          git commit -m "Update Principia cloud manifest pointer for ${{ steps.cloud_inputs.outputs.tag }}" || exit 0
          git push
